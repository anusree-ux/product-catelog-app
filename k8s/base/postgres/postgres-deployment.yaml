apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: product-catalog
  labels:
    app: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:

      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          chown -R 999:999 /var/lib/postgresql/data
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data


      containers:
      - name: postgres
        image: postgres:16

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: product-config
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: product-secret
              key: POSTGRES_PASSWORD


        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data


        resources:
          requests:
            cpu: 250m
            memory: 256Mi

          limits:
            cpu: 1
            memory: 1Gi


        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres

          initialDelaySeconds: 10
          periodSeconds: 10


        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres

          initialDelaySeconds: 30
          periodSeconds: 20


      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
