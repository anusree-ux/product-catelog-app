apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: product-catalog

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: product-frontend:1.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
