apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-frontend-backend
  namespace: product-catalog

spec:
  podSelector:
    matchLabels:
      app: frontend

  policyTypes:
    - Egress

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend

      ports:
        - protocol: TCP
          port: 5000
