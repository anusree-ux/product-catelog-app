server {

    listen 8080;

    location /api/ {

        proxy_pass http://backend-service:5000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

    }


    location / {

        root /usr/share/nginx/html;

        index index.html;

        try_files $uri /index.html;

    }
}
